<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dafam Pekalongan Hotel</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    height:100vh;
    overflow:hidden;
    display:flex;
    justify-content:center;
    align-items:center;
    position:relative;
}

/* SLIDESHOW BACKGROUND */

.slideshow{
    position:fixed;
    width:100%;
    height:100%;
    top:0;
    left:0;
    z-index:-2;
}

.slideshow img{
    position:absolute;
    width:100%;
    height:100%;
    object-fit:cover;
    opacity:0;
    animation:slideShow 25s infinite;
}

/* PHOTO 1 */
.slideshow img:nth-child(1){
    animation-delay:0s;
}

/* PHOTO 2 */
.slideshow img:nth-child(2){
    animation-delay:5s;
}

/* PHOTO 3 */
.slideshow img:nth-child(3){
    animation-delay:10s;
}

/* PHOTO 4 */
.slideshow img:nth-child(4){
    animation-delay:15s;
}

/* PHOTO 5 */
.slideshow img:nth-child(5){
    animation-delay:20s;
}

@keyframes slideShow{
    0%{
        opacity:0;
        transform:scale(1);
    }

    10%{
        opacity:1;
    }

    30%{
        opacity:1;
        transform:scale(1.05);
    }

    40%{
        opacity:0;
    }

    100%{
        opacity:0;
    }
}

/* OVERLAY */

.overlay{
    position:fixed;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.55);
    z-index:-1;
}

/* LOGIN BOX */

.login-box{
    width:380px;
    background:rgba(255,255,255,0.12);
    backdrop-filter:blur(15px);
    border:1px solid rgba(255,255,255,0.2);
    border-radius:25px;
    padding:35px;
    color:white;
    box-shadow:0 10px 40px rgba(0,0,0,0.4);
    animation:fadeIn 1s ease;
}

@keyframes fadeIn{
    from{
        opacity:0;
        transform:translateY(30px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}

.logo{
    text-align:center;
    margin-bottom:25px;
}

.logo h1{
    font-size:30px;
    font-weight:700;
}

.logo p{
    font-size:14px;
    opacity:0.8;
}

.input-group{
    margin-bottom:20px;
}

.input-group label{
    display:block;
    margin-bottom:8px;
    font-size:14px;
}

.input-group input{
    width:100%;
    padding:14px;
    border:none;
    border-radius:12px;
    outline:none;
    background:rgba(255,255,255,0.15);
    color:white;
    font-size:15px;
}

.input-group input::placeholder{
    color:#ddd;
}

.login-btn{
    width:100%;
    padding:14px;
    border:none;
    border-radius:12px;
    background:#00b894;
    color:white;
    font-size:16px;
    font-weight:600;
    cursor:pointer;
    transition:0.3s;
}

.login-btn:hover{
    background:#00a383;
    transform:translateY(-2px);
}

.footer{
    text-align:center;
    margin-top:25px;
}

.footer p{
    font-size:13px;
    margin-bottom:15px;
    opacity:0.8;
}

.links{
    display:flex;
    justify-content:center;
    gap:15px;
}

.links a{
    text-decoration:none;
    color:white;
    padding:10px 18px;
    border-radius:10px;
    font-size:14px;
    transition:0.3s;
}

.whatsapp{
    background:#25D366;
}

.website{
    background:#0984e3;
}

.links a:hover{
    transform:scale(1.05);
}

.running-text{
    margin-top:20px;
    overflow:hidden;
    white-space:nowrap;
    border-top:1px solid rgba(255,255,255,0.2);
    padding-top:12px;
}

.running-text span{
    display:inline-block;
    padding-left:100%;
    animation:marquee 15s linear infinite;
    font-size:13px;
}

@keyframes marquee{
    0%{
        transform:translateX(0);
    }
    100%{
        transform:translateX(-100%);
    }
}

@media(max-width:480px){
    .login-box{
        width:92%;
        padding:25px;
    }
}

</style>
</head>

<body>

<!-- BACKGROUND SLIDESHOW -->

<div class="slideshow">

    <!-- PHOTO 1 -->
    <img src="https://res.cloudinary.com/dvryknjyh/image/upload/v1779723173/Royal_Suite_Room_ozwub7.jpg">

    <!-- PHOTO 2 -->
    <img src="https://res.cloudinary.com/dvryknjyh/image/upload/v1779723173/ChatGPT_Image_May_25_2026_10_09_08_PM_dnlsas.png">

    <!-- PHOTO 3 -->
    <img src="https://res.cloudinary.com/dvryknjyh/image/upload/v1779723173/ChatGPT_Image_May_25_2026_10_18_38_PM_f4udza.png">

    <!-- PHOTO 4 -->
    <img src="https://res.cloudinary.com/dvryknjyh/image/upload/v1779723173/Lobby_5_huw5gf.jpg">

    <!-- PHOTO 5 -->
    <img src="https://res.cloudinary.com/dvryknjyh/image/upload/v1779723173/Scarlett_Night_7_kp6rz7.jpg">

</div>

<div class="overlay"></div>

<!-- LOGIN BOX -->

<div class="login-box">

    <div class="logo">
        <h1>DAFAM HOTEL</h1>
        <p>Free WiFi Hotspot Access</p>
    </div>

    <form action="$(link-login-only)" method="post">

        <input type="hidden" name="dst" value="$(link-orig)">
        <input type="hidden" name="popup" value="true">

        <div class="input-group">
            <label>Username</label>
            <input type="text" name="username" placeholder="Masukkan Username">
        </div>

        <div class="input-group">
            <label>Password</label>
            <input type="password" name="password" placeholder="Masukkan Password">
        </div>

        <button type="submit" class="login-btn">
            CONNECT WIFI
        </button>

    </form>

    <div class="footer">

        <p>Need Help? Contact Reception</p>

        <div class="links">

            <a class="whatsapp"
               href="https://wa.me/6281234567890"
               target="_blank">
               WhatsApp
            </a>

            <a class="website"
               href="https://www.deluxehotel.com"
               target="_blank">
               Website
            </a>

        </div>

    </div>

    <div class="running-text">
        <span>
            Selamat datang di Deluxe Hotel • Nikmati akses internet cepat dan aman • Hubungi Reception bila mengalami kendala koneksi
        </span>
    </div>

</div>

<script>

// AUTO FOCUS
document.querySelector('input[name="username"]').focus();

// VALIDASI LOGIN
document.querySelector("form").addEventListener("submit", function(e){

    let user = document.querySelector('input[name="username"]').value;
    let pass = document.querySelector('input[name="password"]').value;

    if(user === "" || pass === ""){
        e.preventDefault();
        alert("Username dan Password wajib diisi!");
    }

});

</script>

</body>
</html>
