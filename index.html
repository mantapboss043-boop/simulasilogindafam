<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dafam Pekalongan Hotel</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    position:relative;
    overflow:hidden;
    padding:20px;
    background:#000;
}

/* =========================
   BACKGROUND SLIDESHOW
========================= */

.slideshow{
    position:fixed;
    inset:0;
    z-index:-3;
}

.slideshow img{
    position:absolute;
    width:100%;
    height:100%;
    object-fit:cover;
    opacity:0;
    animation:slideShow 25s infinite;
    transform:scale(1);
}

/* Delay tiap foto */

.slideshow img:nth-child(1){
    animation-delay:0s;
}

.slideshow img:nth-child(2){
    animation-delay:5s;
}

.slideshow img:nth-child(3){
    animation-delay:10s;
}

.slideshow img:nth-child(4){
    animation-delay:15s;
}

.slideshow img:nth-child(5){
    animation-delay:20s;
}

@keyframes slideShow{

    0%{
        opacity:0;
        transform:scale(1);
    }

    8%{
        opacity:1;
    }

    28%{
        opacity:1;
        transform:scale(1.08);
    }

    38%{
        opacity:0;
    }

    100%{
        opacity:0;
    }
}

/* =========================
   OVERLAY
========================= */

.overlay{
    position:fixed;
    inset:0;

    /* dibuat lebih transparan */
    background:rgba(0,0,0,0.35);

    z-index:-2;
}

/* =========================
   LOGIN BOX
========================= */

.login-box{

    width:100%;
    max-width:390px;

    background:rgba(255,255,255,0.12);

    backdrop-filter:blur(10px);
    -webkit-backdrop-filter:blur(10px);

    border:1px solid rgba(255,255,255,0.18);

    border-radius:24px;

    padding:30px 24px;

    color:white;

    box-shadow:
    0 10px 35px rgba(0,0,0,0.35);

    animation:fadeIn 1s ease;
}

@keyframes fadeIn{

    from{
        opacity:0;
        transform:translateY(25px);
    }

    to{
        opacity:1;
        transform:translateY(0);
    }
}

/* =========================
   LOGO
========================= */

.logo{
    text-align:center;
    margin-bottom:24px;
}

.logo h1{
    font-size:28px;
    font-weight:700;
    letter-spacing:1px;
}

.logo p{
    margin-top:5px;
    font-size:14px;
    opacity:0.9;
}

/* =========================
   INPUT
========================= */

.input-group{
    margin-bottom:18px;
}

.input-group label{
    display:block;
    margin-bottom:7px;
    font-size:14px;
    font-weight:500;
}

.input-group input{

    width:100%;

    padding:14px 16px;

    border:none;
    border-radius:14px;

    outline:none;

    background:rgba(255,255,255,0.18);

    color:white;

    font-size:15px;
}

.input-group input::placeholder{
    color:#e0e0e0;
}

.input-group input:focus{
    background:rgba(255,255,255,0.24);
}

/* =========================
   BUTTON
========================= */

.login-btn{

    width:100%;

    padding:14px;

    border:none;
    border-radius:14px;

    background:#00b894;

    color:white;

    font-size:16px;
    font-weight:600;

    cursor:pointer;

    transition:0.3s;
}

.login-btn:hover{
    background:#00a383;
    transform:translateY(-2px);
}

/* =========================
   FOOTER
========================= */

.footer{
    text-align:center;
    margin-top:24px;
}

.footer p{
    font-size:13px;
    margin-bottom:14px;
    opacity:0.9;
}

.links{
    display:flex;
    gap:12px;
    justify-content:center;
    flex-wrap:wrap;
}

.links a{

    text-decoration:none;
    color:white;

    padding:10px 16px;

    border-radius:12px;

    font-size:14px;
    font-weight:500;

    transition:0.3s;
}

.whatsapp{
    background:#25D366;
}

.website{
    background:#0984e3;
}

.links a:hover{
    transform:scale(1.04);
}

/* =========================
   RUNNING TEXT
========================= */

.running-text{

    margin-top:22px;

    overflow:hidden;

    white-space:nowrap;

    border-top:1px solid rgba(255,255,255,0.2);

    padding-top:12px;
}

.running-text span{

    display:inline-block;

    padding-left:100%;

    animation:marquee 15s linear infinite;

    font-size:13px;
}

@keyframes marquee{

    0%{
        transform:translateX(0);
    }

    100%{
        transform:translateX(-100%);
    }
}

/* =========================
   MOBILE VIEW
========================= */

@media(max-width:480px){

    body{
        padding:15px;
        align-items:center;
    }

    .login-box{

        width:100%;
        max-width:100%;

        padding:24px 18px;

        border-radius:22px;
    }

    .logo h1{
        font-size:24px;
    }

    .logo p{
        font-size:13px;
    }

    .input-group input{
        padding:13px 14px;
        font-size:14px;
    }

    .login-btn{
        padding:13px;
        font-size:15px;
    }

    .links{
        flex-direction:column;
    }

    .links a{
        width:100%;
    }

    .running-text span{
        font-size:12px;
    }
}

</style>
</head>

<body>

<!-- BACKGROUND SLIDESHOW -->

<div class="slideshow">

    <img src="https://res.cloudinary.com/dvryknjyh/image/upload/v1779723173/Royal_Suite_Room_ozwub7.jpg">

    <img src="https://res.cloudinary.com/dvryknjyh/image/upload/v1779723173/ChatGPT_Image_May_25_2026_10_09_08_PM_dnlsas.png">

    <img src="https://res.cloudinary.com/dvryknjyh/image/upload/v1779723173/ChatGPT_Image_May_25_2026_10_18_38_PM_f4udza.png">

    <img src="https://res.cloudinary.com/dvryknjyh/image/upload/v1779723173/Lobby_5_huw5gf.jpg">

    <img src="https://res.cloudinary.com/dvryknjyh/image/upload/v1779723173/Scarlett_Night_7_kp6rz7.jpg">

</div>

<div class="overlay"></div>

<!-- LOGIN BOX -->

<div class="login-box">

    <div class="logo">
        <h1>DAFAM HOTEL</h1>
        <p>Free WiFi Hotspot Access</p>
    </div>

    <form action="$(link-login-only)" method="post">

        <input type="hidden" name="dst" value="$(link-orig)">
        <input type="hidden" name="popup" value="true">

        <div class="input-group">
            <label>Username</label>
            <input type="text"
                   name="username"
                   placeholder="Masukkan Username">
        </div>

        <div class="input-group">
            <label>Password</label>
            <input type="password"
                   name="password"
                   placeholder="Masukkan Password">
        </div>

        <button type="submit" class="login-btn">
            CONNECT WIFI
        </button>

    </form>

    <div class="footer">

        <p>Need Help? Contact Reception</p>

        <div class="links">

            <a class="whatsapp"
               href="https://wa.me/628895666866"
               target="_blank">
               WhatsApp
            </a>

            <a class="website"
               href="https://mantapboss043-boop.github.io/simulasilogindafam/"
               target="_blank">
               Website
            </a>

        </div>

    </div>

    <div class="running-text">
        <span>
            Selamat datang di Dafam Hotel • Nikmati akses internet cepat dan aman • Hubungi Reception bila mengalami kendala koneksi
        </span>
    </div>

</div>

<script>

// AUTO FOCUS
document.querySelector('input[name="username"]').focus();

// VALIDASI LOGIN
document.querySelector("form").addEventListener("submit", function(e){

    let user = document.querySelector('input[name="username"]').value;
    let pass = document.querySelector('input[name="password"]').value;

    if(user === "" || pass === ""){
        e.preventDefault();
        alert("Username dan Password wajib diisi!");
    }

});

</script>

</body>
</html>
